{% include base_path %}

<header class="masthead" id="masthead">
  <div class="container">
    <div class="masthead__inner">
      <a class="brand" href="{{ base_path }}/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Tianqi Chen</span>
      </a>

      <button class="nav-toggle" aria-label="Toggle navigation" aria-controls="primary-nav" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <nav aria-label="Primary">
        <ul class="nav-list" id="primary-nav">
          <li><a href="{{ base_path }}/"{% if page.url == '/' %} class="is-active"{% endif %}>About</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
            {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li><a href="{{ domain }}{{ link.url }}"{% if page.url contains link.url and link.url != '/' %} class="is-active"{% endif %}>{{ link.title }}</a></li>
          {% endfor %}
          <li><a href="https://scholar.google.com/citations?user=jucvWbcAAAAJ&amp;hl=en" target="_blank" rel="noopener">Scholar</a></li>
          <li><a href="https://github.com/tqch" target="_blank" rel="noopener">GitHub</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>
